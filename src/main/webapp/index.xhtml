<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:h="http://java.sun.com/jsf/html" xmlns:pt="http://xmlns.jcp.org/jsf/passthrough">
<head>
    <style type="text/css">
        body{
            font-family: Arial, sans-serif;
            margin:40px;
        }

        h1{
            color:#333;
        }

        h2{
            margin-top:30px;
        }

        /* Formulaire */
        label{
            display:inline-block;
            width:120px;
            font-weight:bold;
        }

        input[type="text"],
        input[type="date"]{
            width:200px;
            padding:5px;
            border:1px solid #ccc;
            border-radius:4px;
        }

        /* Boutons */
        .btn{
            width:70px;
            padding:4px;
            margin-right:4px;
            border:none;
            background-color:#1976d2;
            color:white;
            border-radius:4px;
            cursor:pointer;
        }

        .btn:hover{
            background-color:#125ea8;
        }

        /* Tableau */
        table{
            margin-top:20px;
            border-collapse:collapse;
            width:100%;
        }

        th{
            background-color:#1976d2;
            color:white;
            padding:8px;
        }

        td{
            padding:8px;
        }

        table, th, td{
            border:1px solid #ddd;
        }

        tr:nth-child(even){
            background-color:#f5f5f5;
        }

        tr:hover{
            background-color:#e9f3ff;
        }
    </style>
    <title>Student Management</title>
</head>
<body>
<h1>Student Management</h1>
<h2>Add Student</h2>
<h:form>
    <h:outputLabel value="First name :"/>
    <h:inputText value="#{studentBean.student.firstName}"/>
    <br/><br/>
    <h:outputLabel value="Last name :"/>
    <h:inputText value="#{studentBean.student.lastName}"/>
    <br/><br/>
    <h:outputLabel value="Email :"/>
    <h:inputText value="#{studentBean.student.email}"/>
    <br/><br/>
    <h:outputLabel value="Birthdate :"/>
    <h:inputText value="#{studentBean.student.birthdate}" pt:type="date">
        <f:convertDateTime pattern="yyyy-MM-dd"/>
    </h:inputText>
    <br/><br/>
    <h:commandButton styleClass="btn" action="#{studentBean.addStudent()}" value="Add"/>
    <br/><br/>

    <h2>Students List</h2>
    <h:dataTable value="#{studentBean.students}" var="s"  rendered="#{not empty studentBean.students}">
        <h:column>
            <f:facet name="header">ID</f:facet>
            #{s.id}
        </h:column>
        <h:column>
            <f:facet name="header">First Name</f:facet>
            <h:panelGroup>
                <h:outputText value="#{s.firstName}" rendered="#{!s.editing}"/>
                <h:inputText value="#{s.firstName}" rendered="#{s.editing}" />
            </h:panelGroup>
        </h:column>

        <h:column>
            <f:facet name="header">Last Name</f:facet>
            <h:panelGroup>
                <h:outputText value="#{s.lastName}" rendered="#{!s.editing}"/>
                <h:inputText value="#{s.lastName}" rendered="#{s.editing}" />
            </h:panelGroup>
        </h:column>
        <h:column>
            <f:facet name="header">Email</f:facet>
            <h:panelGroup>
                <h:outputText value="#{s.email}" rendered="#{!s.editing}"/>
                <h:inputText value="#{s.email}" rendered="#{s.editing}" />
            </h:panelGroup>
        </h:column>
        <!--    <h:column>-->
        <!--        <f:facet name="header">Birthdate</f:facet>-->
        <!--        <h:panelGroup>-->
        <!--            <h:outputText value="#{s.birthdate}" rendered="#{!s.editing}"/>-->
        <!--            <h:inputText value="#{s.birthdate}" rendered="#{s.editing}" binding="#{studentBean.birthDateInput}"/>-->
        <!--        </h:panelGroup>-->
        <!--    </h:column>-->
        <h:column>
            <f:facet name="header">Birthdate</f:facet>
            <h:panelGroup>
                <h:outputText value="#{s.birthdate}" rendered="#{!s.editing}">
                    <f:convertDateTime pattern="yyyy-MM-dd"/>
                </h:outputText>
                <h:inputText value="#{s.birthdate}" rendered="#{s.editing}" pt:type="date">
                    <f:convertDateTime pattern="yyyy-MM-dd"/>
                </h:inputText>
            </h:panelGroup>
        </h:column>
        <h:column>
            <f:facet name="header">Actions</f:facet>
            <h:commandButton value="Edit" action="#{studentBean.editStudent(s)}" rendered="#{!s.editing}" styleClass="btn"/>
            <h:commandButton value="Save" action="#{studentBean.saveEditStudent(s)}" rendered="#{s.editing}" styleClass="btn"/>
            <h:commandButton value="Delete" action="#{studentBean.deleteStudent(s)}" styleClass="btn"/>
        </h:column>
    </h:dataTable>

</h:form>


</body>
</html>
